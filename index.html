<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Group Member Fetcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Builder+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Builder Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #191b20;
      color: #bdbebe;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .header-logo svg {
      width: 36px;
      height: 36px;
    }

    .header-tag {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #00b06f;
      font-weight: 600;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #f5f5f5;
      letter-spacing: 0.5px;
    }

    .header-line {
      width: 50px;
      height: 3px;
      background: #00b06f;
      margin: 12px auto 0;
      border-radius: 2px;
    }

    .search-card {
      background: #232527;
      border: 1px solid #393b3d;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
    }

    .input-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #9a9b9d;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-field {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      font-family: inherit;
      background: #191b20;
      border: 1px solid #393b3d;
      border-radius: 8px;
      color: #f5f5f5;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field::placeholder { color: #5a5c5e; }

    .input-field:focus {
      border-color: #00b06f;
    }

    .btn-fetch {
      padding: 12px 28px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: #00b06f;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-fetch:hover {
      background: #00c77e;
      transform: translateY(-1px);
    }

    .btn-fetch:active {
      transform: translateY(0);
    }

    .btn-fetch:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-cancel {
      width: 100%;
      padding: 10px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: transparent;
      color: #e2231a;
      border: 1px solid rgba(226, 35, 26, 0.3);
      border-radius: 8px;
      cursor: pointer;
      margin-top: 14px;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: rgba(226, 35, 26, 0.08); }

    .error-box {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(226, 35, 26, 0.08);
      border: 1px solid rgba(226, 35, 26, 0.25);
      border-radius: 8px;
      color: #f06b63;
      font-size: 13px;
    }

    .group-info {
      padding: 16px 18px;
      background: #191b20;
      border: 1px solid #393b3d;
      border-radius: 10px;
      margin-top: 18px;
    }

    .group-name { font-size: 16px; font-weight: 700; color: #f5f5f5; }
    .group-meta { font-size: 13px; color: #7a7b7d; margin-top: 4px; }

    .progress-section { margin-top: 18px; }

    .progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #9a9b9d;
      margin-bottom: 8px;
    }

    .progress-track {
      height: 6px;
      background: #191b20;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #00b06f;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .progress-bar.rate-limited {
      background: #f5a623;
    }

    .progress-pct {
      text-align: right;
      font-size: 11px;
      color: #7a7b7d;
      margin-top: 4px;
    }

    /* Results */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .results-title {
      font-size: 18px;
      font-weight: 700;
      color: #f5f5f5;
    }

    .results-count {
      font-size: 13px;
      color: #00b06f;
      font-weight: 600;
    }

    .btn-copy-all {
      padding: 8px 18px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: rgba(0, 176, 111, 0.1);
      color: #00b06f;
      border: 1px solid rgba(0, 176, 111, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-copy-all:hover { background: rgba(0, 176, 111, 0.2); }

    .group-card {
      background: #232527;
      border: 1px solid #393b3d;
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .group-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #2a2c2e;
      border-bottom: 1px solid #393b3d;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .group-card-header:hover {
      background: #313335;
    }

    .group-label {
      font-size: 14px;
      font-weight: 600;
      color: #f5f5f5;
    }

    .group-range {
      font-size: 12px;
      color: #7a7b7d;
    }

    .group-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-copy-group {
      padding: 5px 14px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: rgba(0, 176, 111, 0.1);
      color: #00b06f;
      border: 1px solid rgba(0, 176, 111, 0.25);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-copy-group:hover { background: rgba(0, 176, 111, 0.2); }

    .chevron {
      color: #5a5c5e;
      transition: transform 0.2s;
      font-size: 14px;
    }

    .chevron.open { transform: rotate(90deg); }

    .group-card-body {
      padding: 14px 18px;
      display: none;
    }

    .group-card-body.open { display: block; }

    .id-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 4px 12px;
    }

    .id-item {
      font-size: 13px;
      color: #9a9b9d;
      padding: 3px 0;
      font-variant-numeric: tabular-nums;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #4a4c4e;
      letter-spacing: 0.5px;
      margin-top: 32px;
    }

    .copied-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 10px 24px;
      background: rgba(0, 176, 111, 0.15);
      border: 1px solid rgba(0, 176, 111, 0.3);
      color: #00b06f;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .copied-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="header-logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="8" fill="#232527"/>
          <path d="M13 13L35 19L35 35L13 29Z" fill="#00b06f" opacity="0.9"/>
          <path d="M20 22L28 24.5L28 30L20 27.5Z" fill="#232527"/>
        </svg>
      </div>
      <div class="header-tag">Roblox</div>
      <h1>Group Member Fetcher</h1>
      <div class="header-line"></div>
    </div>

    <div class="search-card">
      <label class="input-label">Group ID</label>
      <div class="input-row">
        <input
          type="text"
          id="groupInput"
          class="input-field"
          placeholder="e.g. 16140130"
          autofocus
        />
        <button id="fetchBtn" class="btn-fetch" onclick="startFetch()">Fetch</button>
      </div>
      <div id="errorBox" class="error-box" style="display:none"></div>
      <div id="groupInfo" class="group-info" style="display:none">
        <div id="groupName" class="group-name"></div>
        <div id="groupMeta" class="group-meta"></div>
      </div>
      <div id="progressSection" class="progress-section" style="display:none">
        <div class="progress-row">
          <span id="progressLabel">Fetching...</span>
          <span id="progressCount">0</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar" style="width:0%"></div>
        </div>
        <div id="progressPct" class="progress-pct"></div>
        <button class="btn-cancel" onclick="cancelFetch()">Cancel</button>
      </div>
    </div>

    <div id="resultsArea" style="display:none"></div>

    <div class="footer">Uses public Roblox Groups API &middot; No auth required</div>
  </div>

  <div id="copiedToast" class="copied-toast">Copied to clipboard</div>

  <script>
    const LIMIT = 100;
    const DELAY = 1000;
    const PROXY = "https://corsproxy.io/?";
    let aborted = false;
    let currentIds = [];
    let currentGroupName = "";

    const $ = id => document.getElementById(id);

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function fetchJSON(url) {
      const resp = await fetch(PROXY + encodeURIComponent(url), {
        headers: { Accept: "application/json" }
      });
      if (resp.status === 429) throw { rateLimited: true };
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      return resp.json();
    }

    function showError(msg) {
      $("errorBox").textContent = msg;
      $("errorBox").style.display = "block";
    }

    function hideError() {
      $("errorBox").style.display = "none";
    }

    function showToast(msg) {
      const t = $("copiedToast");
      t.textContent = msg || "Copied to clipboard";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => showToast());
    }

    $("groupInput").addEventListener("keydown", e => {
      if (e.key === "Enter") startFetch();
    });

    function cancelFetch() {
      aborted = true;
    }

    async function startFetch() {
      const id = $("groupInput").value.trim();
      if (!id || !/^\d+$/.test(id)) {
        showError("Please enter a valid numeric group ID.");
        return;
      }

      hideError();
      aborted = false;
      currentIds = [];
      $("resultsArea").style.display = "none";
      $("resultsArea").innerHTML = "";
      $("fetchBtn").disabled = true;

      // Fetch group info
      let info;
      try {
        info = await fetchJSON("https://groups.roblox.com/v1/groups/" + id);
        currentGroupName = info.name || ("Group " + id);
        $("groupName").textContent = info.name;
        $("groupMeta").textContent =
          (info.memberCount ? info.memberCount.toLocaleString() : "?") +
          " members \u00b7 Owner: " + (info.owner?.username || "N/A");
        $("groupInfo").style.display = "block";
      } catch {
        showError("Could not find that group. Check the ID and try again.");
        $("fetchBtn").disabled = false;
        return;
      }

      // Show progress
      $("progressSection").style.display = "block";
      $("progressBar").style.width = "0%";
      $("progressBar").classList.remove("rate-limited");
      $("progressLabel").textContent = "Fetching page 1...";
      $("progressCount").textContent = "0" + (info.memberCount ? " / " + info.memberCount.toLocaleString() : "");
      $("progressPct").textContent = "";

      let cursor = "";
      let page = 1;
      const ids = [];

      while (!aborted) {
        const url =
          "https://groups.roblox.com/v1/groups/" + id +
          "/users?sortOrder=Asc&limit=" + LIMIT +
          (cursor ? "&cursor=" + cursor : "");

        try {
          const json = await fetchJSON(url);
          const members = json.data || [];
          if (!members.length) break;

          members.forEach(m => ids.push(m.user.userId));

          const pct = info.memberCount > 0
            ? Math.min(100, Math.round((ids.length / info.memberCount) * 100))
            : null;

          $("progressLabel").textContent = "Fetching page " + (page + 1) + "...";
          $("progressCount").textContent =
            ids.length.toLocaleString() +
            (info.memberCount ? " / " + info.memberCount.toLocaleString() : "");
          $("progressBar").style.width = (pct != null ? pct : 30) + "%";
          $("progressBar").classList.remove("rate-limited");
          if (pct != null) $("progressPct").textContent = pct + "%";

          if (!json.nextPageCursor) break;
          cursor = json.nextPageCursor;
          page++;
          await sleep(DELAY);
        } catch (err) {
          if (err.rateLimited) {
            $("progressLabel").textContent = "Rate limited \u2014 waiting 10s...";
            $("progressBar").classList.add("rate-limited");
            await sleep(10000);
            $("progressBar").classList.remove("rate-limited");
          } else {
            showError("Error on page " + page + ": " + err.message);
            break;
          }
        }
      }

      $("progressSection").style.display = "none";
      $("fetchBtn").disabled = false;

      if (aborted || !ids.length) {
        if (!ids.length && !aborted) showError("No members found.");
        return;
      }

      currentIds = ids;
      renderResults(ids);
    }

    function renderResults(ids) {
      const area = $("resultsArea");
      area.style.display = "block";

      // Split into groups of 50
      const groups = [];
      for (let i = 0; i < ids.length; i += 50) {
        groups.push(ids.slice(i, i + 50));
      }

      let html = `
        <div class="results-header">
          <div>
            <div class="results-title">${escapeHtml(currentGroupName)}</div>
            <div class="results-count">${ids.length.toLocaleString()} member IDs \u00b7 ${groups.length} group${groups.length !== 1 ? "s" : ""}</div>
          </div>
          <button class="btn-copy-all" onclick="copyText(currentIds.join('\\n'))">Copy All IDs</button>
        </div>
      `;

      groups.forEach((group, i) => {
        const start = i * 50 + 1;
        const end = start + group.length - 1;
        const cardId = "card-" + i;

        html += `
          <div class="group-card">
            <div class="group-card-header" onclick="toggleCard('${cardId}')">
              <div>
                <span class="group-label">Group ${i + 1}</span>
                <span class="group-range"> \u00b7 IDs ${start}\u2013${end}</span>
              </div>
              <div class="group-actions">
                <button class="btn-copy-group" onclick="event.stopPropagation(); copyGroup(${i})">Copy</button>
                <span class="chevron" id="chev-${cardId}">\u25B6</span>
              </div>
            </div>
            <div class="group-card-body" id="body-${cardId}">
              <div class="id-grid">
                ${group.map(id => `<div class="id-item">${id}</div>`).join("")}
              </div>
            </div>
          </div>
        `;
      });

      area.innerHTML = html;
    }

    function toggleCard(cardId) {
      const body = $("body-" + cardId);
      const chev = $("chev-" + cardId);
      body.classList.toggle("open");
      chev.classList.toggle("open");
    }

    function copyGroup(index) {
      const start = index * 50;
      const group = currentIds.slice(start, start + 50);
      copyText(group.join("\n"));
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }
  </script>

</body>
</html>
