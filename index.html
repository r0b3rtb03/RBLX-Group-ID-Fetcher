<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Group Member Fetcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #191b20;
      color: #bdbebe;
      padding: 0;
    }

    /* Top nav bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: #191b20;
      border-bottom: 1px solid #2a2c2e;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .roblox-logo {
      display: flex;
      align-items: center;
    }

    .roblox-logo svg {
      height: 28px;
      width: auto;
    }

    .topbar-links {
      display: flex;
      gap: 20px;
    }

    .topbar-link {
      font-size: 13px;
      font-weight: 600;
      color: #bdbebe;
      text-decoration: none;
      letter-spacing: 0.2px;
      cursor: default;
    }

    .topbar-link.active {
      color: #fff;
    }

    .topbar-search {
      display: flex;
      align-items: center;
      background: #232527;
      border: 1px solid #393b3d;
      border-radius: 8px;
      padding: 0 14px;
      height: 36px;
      width: 300px;
    }

    .topbar-search svg {
      width: 16px;
      height: 16px;
      color: #5a5c5e;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .topbar-search input {
      background: none;
      border: none;
      outline: none;
      color: #f5f5f5;
      font-size: 13px;
      font-family: inherit;
      width: 100%;
    }

    .topbar-search input::placeholder { color: #5a5c5e; }

    /* Main content */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 800;
      color: #f5f5f5;
      margin-bottom: 24px;
    }

    /* Card */
    .card {
      background: #232527;
      border: 1px solid #2f3133;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: #8a8b8d;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-field {
      flex: 1;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      background: #191b20;
      border: 1px solid #393b3d;
      border-radius: 8px;
      color: #f5f5f5;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-field::placeholder { color: #5a5c5e; }

    .input-field:focus {
      border-color: #3a8bff;
    }

    .btn-fetch {
      padding: 10px 24px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      background: #3a8bff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-fetch:hover {
      background: #5a9fff;
    }

    .btn-fetch:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-cancel {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      background: transparent;
      color: #f06b63;
      border: 1px solid #3a2a2a;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 14px;
      transition: background 0.15s;
    }

    .btn-cancel:hover { background: rgba(240, 107, 99, 0.06); }

    .error-box {
      margin-top: 12px;
      padding: 10px 14px;
      background: #2a1f1f;
      border: 1px solid #3a2a2a;
      border-radius: 8px;
      color: #f06b63;
      font-size: 13px;
    }

    .group-info {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: #191b20;
      border: 1px solid #2f3133;
      border-radius: 10px;
      margin-top: 16px;
    }

    .group-info-icon {
      width: 44px;
      height: 44px;
      background: #2a2c2e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .group-info-icon svg {
      width: 22px;
      height: 22px;
      color: #3a8bff;
    }

    .group-name { font-size: 15px; font-weight: 700; color: #f5f5f5; }
    .group-meta { font-size: 13px; color: #6a6b6d; margin-top: 2px; }

    .progress-section { margin-top: 16px; }

    .progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #8a8b8d;
      margin-bottom: 8px;
    }

    .progress-track {
      height: 4px;
      background: #2a2c2e;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #3a8bff;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .progress-bar.rate-limited {
      background: #e8a33d;
    }

    .progress-pct {
      text-align: right;
      font-size: 12px;
      color: #6a6b6d;
      margin-top: 4px;
    }

    /* Results */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .results-title {
      font-size: 20px;
      font-weight: 800;
      color: #f5f5f5;
    }

    .results-count {
      font-size: 13px;
      color: #3a8bff;
      font-weight: 600;
      margin-top: 2px;
    }

    .btn-copy-all {
      padding: 8px 20px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      background: #3a8bff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-copy-all:hover { background: #5a9fff; }

    .group-card {
      background: #232527;
      border: 1px solid #2f3133;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .group-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }

    .group-card-header:hover {
      background: #2a2c2e;
    }

    .group-label {
      font-size: 14px;
      font-weight: 600;
      color: #f5f5f5;
    }

    .group-range {
      font-size: 12px;
      color: #6a6b6d;
    }

    .group-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-copy-group {
      padding: 4px 14px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      background: transparent;
      color: #3a8bff;
      border: 1px solid #2a3a50;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-copy-group:hover { background: rgba(58, 139, 255, 0.08); }

    .chevron {
      color: #5a5c5e;
      transition: transform 0.2s;
      font-size: 12px;
    }

    .chevron.open { transform: rotate(90deg); }

    .group-card-body {
      padding: 4px 18px 16px;
      display: none;
      border-top: 1px solid #2f3133;
    }

    .group-card-body.open { display: block; }

    .id-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 2px 12px;
    }

    .id-item {
      font-size: 13px;
      color: #9a9b9d;
      padding: 4px 0;
      font-variant-numeric: tabular-nums;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #3a3c3e;
      margin-top: 40px;
      padding-bottom: 20px;
    }

    .copied-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 10px 24px;
      background: #232527;
      border: 1px solid #2f3133;
      color: #3a8bff;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .copied-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 640px) {
      .topbar-search { width: 160px; }
      .topbar-links { display: none; }
      .main { padding: 20px 16px 40px; }
      .page-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- Top navigation bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="roblox-logo">
        <!-- Roblox tilt logo -->
        <svg viewBox="0 0 225 250" xmlns="http://www.w3.org/2000/svg">
          <path d="M 37.7 0 L 0 212.5 L 187.3 250 L 225 37.5 Z M 106.5 156.3 L 68.7 146.9 L 78.1 109.4 L 115.9 118.8 Z" fill="#fff"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <h1 class="page-title">Group Member Fetcher</h1>

    <div class="card">
      <label class="input-label">Group ID</label>
      <div class="input-row">
        <input
          type="text"
          id="groupInput"
          class="input-field"
          placeholder="Enter a group ID..."
          autofocus
        />
        <button id="fetchBtn" class="btn-fetch" onclick="startFetch()">Fetch</button>
      </div>
      <div id="errorBox" class="error-box" style="display:none"></div>
      <div id="groupInfo" class="group-info" style="display:none">
        <div class="group-info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div>
          <div id="groupName" class="group-name"></div>
          <div id="groupMeta" class="group-meta"></div>
        </div>
      </div>
      <div id="progressSection" class="progress-section" style="display:none">
        <div class="progress-row">
          <span id="progressLabel">Fetching...</span>
          <span id="progressCount">0</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar" style="width:0%"></div>
        </div>
        <div id="progressPct" class="progress-pct"></div>
        <button class="btn-cancel" onclick="cancelFetch()">Cancel</button>
      </div>
    </div>

    <div id="resultsArea" style="display:none"></div>

    <div class="footer">Uses public Roblox Groups API &middot; No authentication required</div>
  </div>

  <div id="copiedToast" class="copied-toast">Copied to clipboard</div>

  <script>
    const LIMIT = 100;
    const DELAY = 1000;
    const WORKER = "__WORKER_URL__";
    let aborted = false;
    let currentIds = [];
    let currentGroupName = "";

    const $ = id => document.getElementById(id);

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function fetchJSON(url) {
      const apiPath = url.replace("https://groups.roblox.com", "");
      const resp = await fetch(WORKER + apiPath);
      if (resp.status === 429) throw { rateLimited: true };
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      return resp.json();
    }

    function showError(msg) {
      $("errorBox").textContent = msg;
      $("errorBox").style.display = "block";
    }

    function hideError() {
      $("errorBox").style.display = "none";
    }

    function showToast(msg) {
      const t = $("copiedToast");
      t.textContent = msg || "Copied to clipboard";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => showToast());
    }

    $("groupInput").addEventListener("keydown", e => {
      if (e.key === "Enter") startFetch();
    });

    function cancelFetch() {
      aborted = true;
    }

    async function startFetch() {
      const id = $("groupInput").value.trim();
      if (!id || !/^\d+$/.test(id)) {
        showError("Please enter a valid numeric group ID.");
        return;
      }

      hideError();
      aborted = false;
      currentIds = [];
      $("resultsArea").style.display = "none";
      $("resultsArea").innerHTML = "";
      $("fetchBtn").disabled = true;

      let info;
      try {
        info = await fetchJSON("https://groups.roblox.com/v1/groups/" + id);
        currentGroupName = info.name || ("Group " + id);
        $("groupName").textContent = info.name;
        $("groupMeta").textContent =
          (info.memberCount ? info.memberCount.toLocaleString() : "?") +
          " members \u00b7 Owner: " + (info.owner?.username || "N/A");
        $("groupInfo").style.display = "flex";
      } catch {
        showError("Could not find that group. Check the ID and try again.");
        $("fetchBtn").disabled = false;
        return;
      }

      $("progressSection").style.display = "block";
      $("progressBar").style.width = "0%";
      $("progressBar").classList.remove("rate-limited");
      $("progressLabel").textContent = "Fetching page 1...";
      $("progressCount").textContent = "0" + (info.memberCount ? " / " + info.memberCount.toLocaleString() : "");
      $("progressPct").textContent = "";

      let cursor = "";
      let page = 1;
      const ids = [];

      while (!aborted) {
        const url =
          "https://groups.roblox.com/v1/groups/" + id +
          "/users?sortOrder=Asc&limit=" + LIMIT +
          (cursor ? "&cursor=" + cursor : "");

        try {
          const json = await fetchJSON(url);
          const members = json.data || [];
          if (!members.length) break;

          members.forEach(m => ids.push(m.user.userId));

          const pct = info.memberCount > 0
            ? Math.min(100, Math.round((ids.length / info.memberCount) * 100))
            : null;

          $("progressLabel").textContent = "Fetching page " + (page + 1) + "...";
          $("progressCount").textContent =
            ids.length.toLocaleString() +
            (info.memberCount ? " / " + info.memberCount.toLocaleString() : "");
          $("progressBar").style.width = (pct != null ? pct : 30) + "%";
          $("progressBar").classList.remove("rate-limited");
          if (pct != null) $("progressPct").textContent = pct + "%";

          if (!json.nextPageCursor) break;
          cursor = json.nextPageCursor;
          page++;
          await sleep(DELAY);
        } catch (err) {
          if (err.rateLimited) {
            $("progressLabel").textContent = "Rate limited \u2014 waiting 10s...";
            $("progressBar").classList.add("rate-limited");
            await sleep(10000);
            $("progressBar").classList.remove("rate-limited");
          } else {
            showError("Error on page " + page + ": " + err.message);
            break;
          }
        }
      }

      $("progressSection").style.display = "none";
      $("fetchBtn").disabled = false;

      if (aborted || !ids.length) {
        if (!ids.length && !aborted) showError("No members found.");
        return;
      }

      currentIds = ids;
      renderResults(ids);
    }

    function renderResults(ids) {
      const area = $("resultsArea");
      area.style.display = "block";

      const groups = [];
      for (let i = 0; i < ids.length; i += 50) {
        groups.push(ids.slice(i, i + 50));
      }

      let html = `
        <div class="results-header">
          <div>
            <div class="results-title">${escapeHtml(currentGroupName)}</div>
            <div class="results-count">${ids.length.toLocaleString()} member IDs \u00b7 ${groups.length} group${groups.length !== 1 ? "s" : ""}</div>
          </div>
          <button class="btn-copy-all" onclick="copyText(currentIds.join('\\n'))">Copy All IDs</button>
        </div>
      `;

      groups.forEach((group, i) => {
        const start = i * 50 + 1;
        const end = start + group.length - 1;
        const cardId = "card-" + i;

        html += `
          <div class="group-card">
            <div class="group-card-header" onclick="toggleCard('${cardId}')">
              <div>
                <span class="group-label">Group ${i + 1}</span>
                <span class="group-range"> \u00b7 IDs ${start}\u2013${end}</span>
              </div>
              <div class="group-actions">
                <button class="btn-copy-group" onclick="event.stopPropagation(); copyGroup(${i})">Copy</button>
                <span class="chevron" id="chev-${cardId}">\u25B6</span>
              </div>
            </div>
            <div class="group-card-body" id="body-${cardId}">
              <div class="id-grid">
                ${group.map(id => `<div class="id-item">${id}</div>`).join("")}
              </div>
            </div>
          </div>
        `;
      });

      area.innerHTML = html;
    }

    function toggleCard(cardId) {
      const body = $("body-" + cardId);
      const chev = $("chev-" + cardId);
      body.classList.toggle("open");
      chev.classList.toggle("open");
    }

    function copyGroup(index) {
      const start = index * 50;
      const group = currentIds.slice(start, start + 50);
      copyText(group.join("\n"));
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }
  </script>

</body>
</html>
